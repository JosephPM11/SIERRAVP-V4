# =====================================================================
#  SIERRAVP-V3  ·  Configuración de la aplicación web (N capas)
# =====================================================================
spring.application.name=SIERRAVP-V3
server.port=8080

# ---------------------------------------------------------------------
#  CAPA DE DATOS  ·  Servidor de Datos (BD transaccional / OLTP)
#  Cambia host/usuario/clave por los de tu Servidor de Datos.
#  createDatabaseIfNotExist=true → crea la BD sola en la primera demo.
# ---------------------------------------------------------------------
sierravp.datos.host=localhost
sierravp.datos.port=3306
sierravp.datos.db=sierravp_transaccional
sierravp.datos.user=root
sierravp.datos.pass=root

spring.datasource.url=jdbc:mysql://${sierravp.datos.host}:${sierravp.datos.port}/${sierravp.datos.db}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=${sierravp.datos.user}
spring.datasource.password=${sierravp.datos.pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------------
#  CAPA DE DATAWAREHOUSE  ·  Servidor de DataWareHouse (modelo dimensional)
#  En producción sería OTRO servidor; para la demo apunta al mismo MySQL
#  pero a otro esquema (sierravp_datawarehouse).
# ---------------------------------------------------------------------
sierravp.dw.host=localhost
sierravp.dw.port=3306
sierravp.dw.db=sierravp_datawarehouse
sierravp.dw.user=root
sierravp.dw.pass=root

sierravp.dw.url=jdbc:mysql://${sierravp.dw.host}:${sierravp.dw.port}/${sierravp.dw.db}?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true

# ---------------------------------------------------------------------
#  JPA / Hibernate (aplica a ambas unidades de persistencia)
# ---------------------------------------------------------------------
# Nota: con dos datasources, el EntityManagerFactoryBuilder solo aplica las
# propiedades bajo 'spring.jpa.properties.*'; por eso hbm2ddl.auto va aquí
# (y no como spring.jpa.hibernate.ddl-auto, que solo afecta al EMF por defecto).
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ---------------------------------------------------------------------
#  CAPA FTP (simulada) y CAPA MIRROR (simulada)
#  - ftp.dir   : "buzón" donde se publican los exports (simula un FTP).
#  - mirror.dir: copia espejo de los datos (simula la BD Mirror/réplica).
#  Ver docs/03_FTP_Mirror_simulado.md
# ---------------------------------------------------------------------
sierravp.ftp.dir=${user.home}/SIERRAVP_FTP
sierravp.mirror.dir=${user.home}/SIERRAVP_MIRROR

# ---------------------------------------------------------------------
#  Periodo académico vigente. Solo se pueden ingresar/editar notas de
#  este periodo; los anteriores quedan en solo lectura (cerrados).
# ---------------------------------------------------------------------
sierravp.periodo-actual=2026-I

# ---------------------------------------------------------------------
#  Thymeleaf
# ---------------------------------------------------------------------
spring.thymeleaf.cache=false

# Logs
logging.level.org.hibernate.SQL=warn
logging.level.com.killa.sierravp=info
